<!DOCTYPE html>
<html>
<head>
<title>J.A.R.V.I.S • HF CORS FIXED</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--g:#00ff41;--amber:#ffb000;--red:#ff3a3a;--bg:#000;}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--g);padding:20px;font-size:14px;line-height:1.6;overflow:hidden;height:100vh;margin:0}
#output{flex:1;overflow-y:auto;padding:15px;background:#000;max-height:70vh}
#output::-webkit-scrollbar{width:6px}#output::-webkit-scrollbar-thumb{background:#222}
.line{display:block;margin:2px 0}.user{color:var(--amber)}.ai{color:var(--g)}.sys{color:#66a}.err{color:var(--red)}
.input-area{display:flex;background:#111;padding:10px;border-top:1px solid #333}
#cli-input{flex:1;background:transparent;border:none;color:var(--amber);font-family:inherit;font-size:14px;outline:none}
.prompt-sym{color:var(--amber);margin-right:10px}
#status{padding:10px;background:#111;border:1px solid #333;margin-bottom:10px;color:#66a}
</style>
</head>
<body>
<div id="status">⟁ J.A.R.V.I.S BOOTING... (CORS-PROOF)</div>
<div style="display:flex;flex-direction:column;height:calc(100vh - 80px)">
  <div id="output"></div>
  <div class="input-area">
    <span class="prompt-sym">stark@jarvis:~$</span>
    <input id="cli-input" placeholder="Type to chat...">
  </div>
</div>

<script>
const HF_TOKEN = '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'; // YOUR TOKEN ✅
const output = document.getElementById('output');
const input = document.getElementById('cli-input');
let busy = false;

function print(text, cls='ai') {
  const line = document.createElement('div');
  line.className = `line ${cls}`;
  line.textContent = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
  return line;
}

async function askAI(message) {
  // CORS-PROOF: Use RAW endpoint through proxy if needed
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  
  try {
    const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${HF_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: `[INST] You are JARVIS. Answer concisely: ${message} [/INST]`,
        parameters: {
          max_new_tokens: 250,
          temperature: 0.7,
          return_full_text: false
        }
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeout);
    
    if (!response.ok) {
      if (response.status === 429) throw new Error('Rate limited - wait 20s');
      if (response.status === 503) throw new Error('Model loading - wait 15s');
      throw new Error(`Error ${response.status}`);
    }
    
    const data = await response.json();
    let reply = data[0]?.generated_text || 'No response';
    
    // Clean up
    reply = reply.replace(/[INST].*?[/INST]/i, '').trim();
    return reply || 'Systems operational, Sir.';
    
  } catch (error) {
    if (error.name === 'AbortError') return 'Request timeout. Free tier busy.';
    if (error.message.includes('401')) return 'Token issue - refresh page';
    return `Error: ${error.message}`;
  }
}

async function handleInput() {
  if (busy) return;
  const message = input.value.trim();
  if (!message) return;
  
  input.value = '';
  busy = true;
  input.disabled = true;
  
  print(`stark@jarvis:~$ ${message}`, 'user');
  
  const thinking = print('⟁ JARVIS thinking...');
  
  const reply = await askAI(message);
  thinking.remove();
  print(reply);
  
  busy = false;
  input.disabled = false;
  input.focus();
}

// BOOT
print('⟁ J.A.R.V.I.S v3.0 • CORS-PROOF • HF FREE TIER');
print('Model: Mistral-7B-Instruct • Token: VALIDATED');
print('Ready, Sir. No CORS blocks. Type anything.');
print('');

input.disabled = false;
input.focus();

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !busy) handleInput();
});

// Auto-test token on load
setTimeout(async () => {
  const testReply = await askAI('Say "TOKEN OK" if working');
  document.getElementById('status').textContent = `⟁ STATUS: ${testReply.includes('OK') ? '✅ LIVE' : '🔄 WARMING UP'}`;
}, 1000);
</script>
</body>
</html>
