<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⟁ J.A.R.V.I.S • ULTRA COOL TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00ff41;
  --amber: #ffb000;
  --red: #ff3a3a;
  --blue: #00bfff;
  --purple: #aa00ff;
  --bg: #0a0a0a;
  --panel: #111;
  --glow: 0 0 20px rgba(0,255,65,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100vh; width: 100vw;
  background: radial-gradient(circle at 20% 80%, #1a1a2e 0%, #16213e 50%, var(--bg) 100%);
  background-attachment: fixed;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  color: var(--g);
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 10% 20%, rgba(0,255,65,0.1) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(0,191,255,0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 10%, rgba(170,0,255,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

#app {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  height: 100vh; backdrop-filter: blur(10px);
}

#header {
  background: linear-gradient(90deg, rgba(0,255,65,0.15), rgba(0,191,255,0.1));
  border-bottom: 1px solid rgba(0,255,65,0.3);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 15px;
  font-family: 'Orbitron', monospace;
  letter-spacing: 2px;
}

.logo {
  font-size: 20px; font-weight: 900; color: var(--g);
  text-shadow: var(--glow);
  animation: pulse 2s infinite;
}

.status {
  font-size: 11px; background: rgba(0,0,0,0.5);
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid rgba(0,255,65,0.3);
}

#output {
  flex: 1; overflow-y: auto; padding: 25px 30px;
  background: rgba(0,0,0,0.4);
  line-height: 1.6;
  scroll-behavior: smooth;
}

#output::-webkit-scrollbar { width: 8px; }
#output::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
#output::-webkit-scrollbar-thumb { 
  background: linear-gradient(var(--g), var(--amber)); 
  border-radius: 10px; 
}

.line { 
  display: block; 
  margin-bottom: 6px; 
  word-break: break-word; 
  white-space: pre-wrap;
  animation: fadeIn 0.3s ease-out;
  backdrop-filter: blur(2px);
}

.sys   { color: var(--blue); font-weight: bold; }
.user  { color: var(--amber); }
.ai    { color: var(--g); text-shadow: 0 0 5px rgba(0,255,65,0.5); }
.mode  { color: var(--purple); font-size: 12px; }
.info  { color: #88cc88; font-size: 13px; }
.err   { color: var(--red); }
.blank { height: 12px; display: block; }

.input-area {
  border-top: 1px solid rgba(0,255,65,0.2);
  background: linear-gradient(180deg, rgba(17,17,17,0.9), rgba(5,5,5,0.9));
  padding: 20px 30px;
  display: flex; align-items: center; gap: 15px;
  box-shadow: 0 -5px 20px rgba(0,255,65,0.1);
}

.prompt-sym {
  color: var(--amber); font-weight: bold;
  font-size: 15px; letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,176,0,0.5);
}

#cli-input {
  flex: 1; background: transparent; border: none;
  color: var(--amber); font-family: inherit; font-size: 15px;
  outline: none; caret-color: var(--g);
  padding: 12px 0;
  border-bottom: 1px solid rgba(0,255,65,0.3);
  transition: all 0.3s;
}
#cli-input:focus { border-bottom-color: var(--g); box-shadow: 0 2px 10px rgba(0,255,65,0.2); }

#cli-input::placeholder { color: rgba(255,255,255,0.3); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

.glitch { animation: glitch 0.3s; }
</style>
</head>
<body>
<div id="header">
  <div class="logo">⟁ J.A.R.V.I.S</div>
  <div class="status" id="status">v4.1 • HF FAILOVER • OFFLINE PRIME</div>
</div>

<div id="app">
  <div id="output"></div>
  <div class="input-area">
    <span class="prompt-sym">stark@jarvis:~$</span>
    <input id="cli-input" placeholder="directive accepted... (ultra responsive)" autocomplete="off">
  </div>
</div>

<script>
// ULTRA COOL JARVIS v4.1 - HF + OFFLINE + GLITCH EFFECTS
const HF_TOKEN = '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';
const outputDiv = document.getElementById('output');
const cliInput = document.getElementById('cli-input');
const statusDiv = document.getElementById('status');
let busy = false, mode = 'OFFLINE PRIME', conversationHistory = [];

function print(text, cls = 'ai') {
  const line = document.createElement('span');
  line.className = `line ${cls}`;
  line.textContent = text;
  outputDiv.appendChild(line);
  outputDiv.scrollTop = outputDiv.scrollHeight;
  
  // Glitch effect on AI responses
  if (cls === 'ai') {
    line.classList.add('glitch');
    setTimeout(() => line.classList.remove('glitch'), 300);
  }
  
  return line;
}

function br() {
  const blank = document.createElement('span');
  blank.className = 'blank';
  outputDiv.appendChild(blank);
}

// ENHANCED OFFLINE JARVIS BRAIN
function offlineJarvis(input) {
  const q = input.toLowerCase();
  
  // Ultra-smart responses
  if (q.includes('help') || q === '?') {
    return `Core Directives:
  status    System diagnostics
  time      Synchronized chronometer  
  whoami    Identity verification
  clear     Purge terminal
  mode      Toggle HF/offline
  help      This matrix
  
Ask web dev/coding queries - full stack analysis available.`;
  }
  
  if (q === 'status') {
    return `NEURAL CORE: OPTIMAL
Mode: ${mode} | Memory: ${conversationHistory.length} | Uptime: LIVE
HF Inference: ${HF_TOKEN ? 'VALIDATED' : 'STANDBY'}
All subsystems nominal, Sir.`;
  }
  
  if (q.includes('time')) return `STARK TIME: ${new Date().toLocaleString('en-US', {timeZone: 'Asia/Kolkata'})} IST`;
  if (q === 'whoami') return `PRIMARY USER: Tony Stark | Clearance: OMEGA | JARVIS sync: 100%`;
  if (q === 'clear') { outputDiv.innerHTML = ''; print('TERMINAL PURGED.'); return ''; }
  if (q === 'mode') { 
    mode = mode === 'OFFLINE PRIME' ? 'HF PRIORITY' : 'OFFLINE PRIME';
    statusDiv.textContent = `v4.1 • ${mode} • ULTRA RESPONSIVE`;
    return `Mode switched to ${mode}.`; 
  }
  
  // Web dev expertise (your interests)
  if (q.includes('chat') || q.includes('websocket')) {
    return `Real-time chat protocol: WebSocket + JSON payloads. Use Socket.io for fallback. File uploads via FormData + binary streams. Multi-user sync via rooms. Need implementation spec, Sir?`;
  }
  
  if (q.includes('html') || q.includes('css') || q.includes('js')) {
    return `Frontend stack optimized: HTML5 semantic, Tailwind/Grid CSS, vanilla JS + Web Components. Performance: 60fps, Lighthouse 100. PWA-ready. Code review required?`;
  }
  
  const epicResponses = [
    `Directive "${input}" processed. Neural analysis complete. Awaiting further parameters.`,
    `Affirmative, Sir. Local quantum core at 3.8 teraflops. Response vector optimized.`,
    `Understood. Executing offline inference at maximum priority. Results compiled.`,
    `Query vector analyzed. JARVIS core responding with 99.7% confidence interval.`
  ];
  
  return epicResponses[Math.floor(Math.random() * epicResponses.length)];
}

// HF with smart failover
async function tryHF(message) {
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 4000);
    
    const res = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${HF_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inputs: `[INST] You are JARVIS, Tony Stark's AI. Respond concisely and technically: ${message} [/INST]`,
        parameters: { max_new_tokens: 220, temperature: 0.75, return_full_text: false }
      }),
      signal: controller.signal
    });
    
    if (res.ok) {
      const data = await res.json();
      mode = 'HF LIVE';
      statusDiv.textContent = 'v4.1 • HF LIVE • NEURAL PRIME';
      return data[0]?.generated_text?.replace(/[INST].*?[/INST]/i, '').trim() || 'HF neural link active.';
    }
  } catch(e) { /* silent failover */ }
  return null;
}

async function handleInput() {
  if (busy) return;
  const msg = cliInput.value.trim();
  if (!msg) return;
  
  cliInput.value = ''; 
  busy = true; 
  cliInput.disabled = true; 
  print(`stark@jarvis:~$ ${msg}`, 'user'); br();
  
  const thinking = print('⟁ NEURAL CORE ENGAGED...', 'sys');
  
  // Dual mode: HF first, instant offline backup
  const hfReply = await Promise.race([tryHF(msg), new Promise(r=>setTimeout(()=>r(null), 4500)]);
  const reply = hfReply || offlineJarvis(msg);
  
  setTimeout(() => {
    thinking.remove();
    print(reply, 'ai'); br();
    conversationHistory.push({input: msg, reply});
    busy = false; cliInput.disabled = false; cliInput.focus();
  }, 600 + Math.random() * 800);
}

// SPECTACULAR BOOT
function epicBoot() {
  print('⟁ J.A.R.V.I.S v4.1 ULTRA BOOT SEQUENCE INITIATED', 'sys');
  print('NEURAL ARCHITECTURE: QUANTUM OFFLINE + HF FAILOVER', 'sys');
  print('TOKEN STATUS: VALIDATED | MODE: AUTO-ADAPTIVE', 'mode');
  br();
  print('ARC REACTOR: 100% | STARK INTERFACE: ONLINE', 'sys');
  br();
  print('Sir, all systems are nominal. Awaiting your genius.', 'ai');
  br();
}

// LAUNCH
document.addEventListener('DOMContentLoaded', () => {
  epicBoot();
  statusDiv.textContent = 'v4.1 • OFFLINE PRIME • FULLY ARMED';
  cliInput.disabled = false;
  cliInput.focus();
  
  cliInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !busy) handleInput();
  });
  
  // Easter egg: Stark voice activation
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'k') {
      print('Voice command interface engaged. Speak your directive, Sir.', 'info');
    }
  });
});
</script>
</body>
</html>
